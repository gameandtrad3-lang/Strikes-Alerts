name: Daily Strike Intelligence Update

on:
  schedule:
      - cron: '0 11 * * *'
        workflow_dispatch:

        jobs:
          update-intel:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout repository
                                uses: actions/checkout@v4
                                        with:
                                                  token: ${{ secrets.GITHUB_TOKEN }}

                                                        - name: Set up Node.js
                                                                uses: actions/setup-node@v4
                                                                        with:
                                                                                  node-version: '20'

                                                                                        - name: Install dependencies
                                                                                                run: npm install node-fetch

                                                                                                      - name: Run intelligence scan
                                                                                                              env:
                                                                                                                        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                                                                                                                                run: node scripts/scan.js
                                                                                                                                
                                                                                                                                      - name: Check for changes
                                                                                                                                              id: changes
                                                                                                                                                      run: |
                                                                                                                                                                git diff --exit-code src/data.js || echo "changed=true" >> $GITHUB_OUTPUT
                                                                                                                                                                
                                                                                                                                                                      - name: Commit and push if data changed
                                                                                                                                                                              if: steps.changes.outputs.changed == 'true'
                                                                                                                                                                                      run: |
                                                                                                                                                                                                git config --global user.name 'StrikeIntel Bot'
                                                                                                                                                                                                          git config --global user.email 'bot@strikesalerts.com'
                                                                                                                                                                                                                    git add src/data.js
                                                                                                                                                                                                                              git commit -m "Daily intel update - $(date +'%Y-%m-%d')"
                                                                                                                                                                                                                                        git push
